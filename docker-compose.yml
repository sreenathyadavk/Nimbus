version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: photos-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photos-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/photos
    volumes:
      - /media/sreenath/Dell1/K:/app/storage
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
